{% extends "base.html" %}

{% block content %}
<!-- Úzký formulář pro registraci nového účtu. -->
<section class="form-section narrow">
  <div class="panel">
    <h1>Web registrace</h1>
    <p>Po registraci můžeš stejný účet použít ve webu i v desktopové hře.</p>

    <!-- Formulář odesílá data metodou POST na route `/register`. -->
    <form method="post" class="form-grid">
      <label for="username">Uživatelské jméno</label>
      <input id="username" name="username" type="text" autocomplete="username" minlength="3" required>

      <label for="password">Heslo</label>
      <!-- První heslo + tlačítko pro zobrazení/skrytí textu hesla. -->
      <div class="password-field">
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="new-password"
          minlength="4"
          pattern="(?=.*[A-Z])(?=.*\d).{4,}"
          title="Heslo musí mít aspoň 4 znaky, 1 velké písmeno a 1 číslo."
          required
        >
        <button class="password-toggle-icon" type="button" data-toggle-password="password" aria-label="Zobrazit heslo">
          <svg class="icon-eye-off" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10.58 10.58a2 2 0 0 0 2.83 2.83"></path>
            <path d="M9.88 5.09A10.94 10.94 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-2.17 3.19"></path>
            <path d="M6.71 6.71A12.94 12.94 0 0 0 2 12s3 7 10 7a9.77 9.77 0 0 0 5.29-1.47"></path>
            <line x1="2" y1="2" x2="22" y2="22"></line>
          </svg>
          <svg class="icon-eye" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>

      <!-- Druhé heslo slouží ke kontrole, že uživatel neudělal překlep. -->
      <label for="password2">Heslo znovu</label>
      <div class="password-field">
        <input
          id="password2"
          name="password2"
          type="password"
          autocomplete="new-password"
          minlength="4"
          pattern="(?=.*[A-Z])(?=.*\d).{4,}"
          title="Heslo musí mít aspoň 4 znaky, 1 velké písmeno a 1 číslo."
          required
        >
        <button class="password-toggle-icon" type="button" data-toggle-password="password2" aria-label="Zobrazit heslo">
          <svg class="icon-eye-off" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10.58 10.58a2 2 0 0 0 2.83 2.83"></path>
            <path d="M9.88 5.09A10.94 10.94 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-2.17 3.19"></path>
            <path d="M6.71 6.71A12.94 12.94 0 0 0 2 12s3 7 10 7a9.77 9.77 0 0 0 5.29-1.47"></path>
            <line x1="2" y1="2" x2="22" y2="22"></line>
          </svg>
          <svg class="icon-eye" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>

      <button class="btn btn-primary" type="submit">Vytvořit účet</button>
    </form>

    <p>Už účet máš? <a href="{{ url_for('login') }}">Přihlas se</a>.</p>
  </div>
</section>

<!-- JavaScript pro přepínání viditelnosti polí s heslem. -->
<script>
  // Projdeme všechna tlačítka s atributem `data-toggle-password`.
  document.querySelectorAll('[data-toggle-password]').forEach((btn) => {
    // Po kliknutí přepneme typ inputu mezi `password` a `text`.
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.togglePassword);
      // Když input nenajdeme, funkce bezpečně skončí.
      if (!input) return;
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.classList.toggle('is-visible', isHidden);
      btn.setAttribute('aria-label', isHidden ? 'Skrýt heslo' : 'Zobrazit heslo');
    });
  });
</script>
{% endblock %}
